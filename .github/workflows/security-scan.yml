name: "🛡️ Security & Vulnerability Scan"

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  # Allows manual triggering from the GitHub Actions UI
  workflow_dispatch:
  # Allows triggering via external webhooks
  repository_dispatch:
    types: [ trigger-security-scan ]

jobs:
  static-analysis:
    name: Repository Static Scan
    runs-on: ubuntu-latest
    # Permissions required to upload SARIF data to the GitHub Security Tab
    permissions:
      security-events: write
      contents: read
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Scan the repository and output findings as a SARIF file
      - name: Run Trivy vulnerability scanner (SARIF Mode)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          # Use '0' so the workflow doesn't fail here, allowing the upload step to run
          exit-code: '0' 
          ignore-unfixed: true
          severity: 'CRITICAL,HIGH'
          scanners: 'vuln,misconfig,secret'

      # Upload the SARIF file directly into GitHub's Native Security Dashboard
      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always() # Ensures results are uploaded even if previous steps failed
        with:
          sarif_file: 'trivy-results.sarif'