name: Build & Deploy Container Images

on:
  # Trigger on changes to Containerfiles only
  push:
    paths:
      - 'flavors/**'
  
  # Trigger on new releases
  release:
    types: [published]
  
  # Allow manual triggering
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: migoller
  # Lowercase naming convention for GHCR packages
  BASE_IMAGE_NAME: ai-agent-sandbox-base
  HERMES_IMAGE_NAME: ai-agent-sandbox-hermes
  AIDER_IMAGE_NAME: ai-agent-sandbox-aider
  CLAUDE_IMAGE_NAME: ai-agent-sandbox-claude-code

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
    
      # Log in to the GitHub Container Registry securely for both Host and Buildx
      - name: Log in to the GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
    
      # Set up QEMU to enable multi-platform emulation (required for building arm64 on amd64 runners)
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: all

      # Set up Docker Buildx to leverage advanced multi-architecture container builds
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Step 1: Build & Push Multi-Architecture Base Image
      - name: Build and push base image
        uses: docker/build-push-action@v6
        with:
          context: flavors/base
          file: flavors/base/Containerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/migoller/ai-agent-sandbox-base:latest
            ghcr.io/migoller/ai-agent-sandbox-base:${{ github.sha }}

      # Step 2: Build & Push Multi-Architecture Hermes Flavor Image
      - name: Build and push Hermes flavor
        uses: docker/build-push-action@v6
        with:
          context: flavors/hermes
          file: flavors/hermes/Containerfile
          platforms: linux/amd64,linux/arm64
          push: true
          # Instructs Buildx to map the local base image reference to the newly built GHCR image
          build-contexts: |
            ai-agent-sandbox:base=docker-image://ghcr.io/migoller/ai-agent-sandbox-base:latest
          tags: |
            ghcr.io/migoller/ai-agent-sandbox-hermes:latest
            ghcr.io/migoller/ai-agent-sandbox-hermes:${{ github.sha }}

      # Step 3: Build & Push Multi-Architecture Aider Flavor Image
      - name: Build and push Aider flavor
        uses: docker/build-push-action@v6
        with:
          context: flavors/aider
          file: flavors/aider/Containerfile
          platforms: linux/amd64,linux/arm64
          push: true
          # Map the local base reference for dependency resolution
          build-contexts: |
            ai-agent-sandbox:base=docker-image://ghcr.io/migoller/ai-agent-sandbox-base:latest
          tags: |
            ghcr.io/migoller/ai-agent-sandbox-aider:latest
            ghcr.io/migoller/ai-agent-sandbox-aider:${{ github.sha }}

      # Step 4: Build & Push Multi-Architecture Claude-Code Flavor Image
      - name: Build and push Claude-Code flavor
        uses: docker/build-push-action@v6
        with:
          context: flavors/claude-code
          file: flavors/claude-code/Containerfile
          platforms: linux/amd64,linux/arm64
          push: true
          # Map the local base reference for dependency resolution
          build-contexts: |
            ai-agent-sandbox:base=docker-image://ghcr.io/migoller/ai-agent-sandbox-base:latest
          tags: |
            ghcr.io/migoller/ai-agent-sandbox-claude-code:latest
            ghcr.io/migoller/ai-agent-sandbox-claude-code:${{ github.sha }}
  
      # 5. Generate Dynamic Release Summary (Directly visible in GitHub Actions UI)
      - name: Create release notes summary
        run: |
          {
            echo "## 📦 Container Image Build Summary"
            echo "**Built:** $(date)"
            echo "**Commit:** ${{ github.sha }}"
            echo ""
            echo "### 🚀 Available Packages:"
            echo "- **Base:** \`${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ env.BASE_IMAGE_NAME }}:latest\`"
            echo "- **Hermes:** \`${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ env.HERMES_IMAGE_NAME }}:latest\`"
            echo "- **Aider:** \`${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ env.AIDER_IMAGE_NAME }}:latest\`"
            echo "- **Claude Code:** \`${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ env.CLAUDE_IMAGE_NAME }}:latest\`"
          } >> $GITHUB_STEP_SUMMARY
