name: Build & Deploy Container Images

on:
  push:
    paths:
      - 'flavors/**'
  release:
    types: [published]
  workflow_dispatch:
  repository_dispatch:
    types: [ trigger-container-build ]

permissions:
  contents: read
  packages: write
  security-events: write

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: migoller
  BASE_IMAGE_NAME: ai-agent-sandbox-base
  HERMES_IMAGE_NAME: ai-agent-sandbox-hermes
  AIDER_IMAGE_NAME: ai-agent-sandbox-aider
  CLAUDE_IMAGE_NAME: ai-agent-sandbox-claude-code

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
      security-events: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # --- DETECT CHANGES ---
      # This step checks exactly which directories were modified in this commit
      - name: Check changed files
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            base:
              - 'flavors/base/**'
            hermes:
              - 'flavors/hermes/**'
            aider:
              - 'flavors/aider/**'
            claude-code:
              - 'flavors/claude-code/**'

      # Log in to the GitHub Container Registry securely
      - name: Log in to the GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
    
      # Set up QEMU to enable multi-platform emulation
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: all

      # Set up Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ==============================================================================
      # STEP 1: BASE IMAGE (Only runs if base changed OR manual/webhook trigger)
      # ==============================================================================
      - name: Build and push base image
        if: |
          github.event_name == 'workflow_dispatch' ||
          github.event_name == 'repository_dispatch' ||
          github.event_name == 'release' ||
          steps: filter.outputs.base == 'true'
        uses: docker/build-push-action@v6
        with:
          context: flavors/base
          file: flavors/base/Containerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/migoller/ai-agent-sandbox-base:latest
            ghcr.io/migoller/ai-agent-sandbox-base:${{ github.sha }}

      # ==============================================================================
      # STEP 2: HERMES FLAVOR (Runs if hermes changed OR base changed OR manual/webhook)
      # ==============================================================================
      - name: Build and push Hermes flavor
        if: |
          github.event_name == 'workflow_dispatch' ||
          github.event_name == 'repository_dispatch' ||
          github.event_name == 'release' ||
          steps: filter.outputs.base == 'true' ||
          steps: filter.outputs.hermes == 'true'
        uses: docker/build-push-action@v6
        with:
          context: flavors/hermes
          file: flavors/hermes/Containerfile
          platforms: linux/amd64,linux/arm64
          push: true
          build-contexts: |
            ai-agent-sandbox:base=docker-image://ghcr.io/migoller/ai-agent-sandbox-base:latest
          tags: |
            ghcr.io/migoller/ai-agent-sandbox-hermes:latest
            ghcr.io/migoller/ai-agent-sandbox-hermes:${{ github.sha }}

      - name: Run Trivy scanner on Hermes image
        if: |
          github.event_name == 'workflow_dispatch' ||
          github.event_name == 'repository_dispatch' ||
          github.event_name == 'release' ||
          steps: filter.outputs.base == 'true' ||
          steps: filter.outputs.hermes == 'true'
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: 'image'
          image-ref: '${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ env.HERMES_IMAGE_NAME }}:latest'
          format: 'sarif'
          output: 'trivy-hermes-results.sarif'
          exit-code: '0'
          ignore-unfixed: true
          severity: 'CRITICAL,HIGH'

      - name: Upload Hermes scan results to GitHub Security tab
        if: |
          always() && (
            github.event_name == 'workflow_dispatch' ||
            github.event_name == 'repository_dispatch' ||
            github.event_name == 'release' ||
            steps: filter.outputs.base == 'true' ||
            steps: filter.outputs.hermes == 'true'
          )
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-hermes-results.sarif'
          category: 'image-hermes'

      # ==============================================================================
      # STEP 3: AIDER FLAVOR (Runs if aider changed OR base changed OR manual/webhook)
      # ==============================================================================
      - name: Build and push Aider flavor
        if: |
          github.event_name == 'workflow_dispatch' ||
          github.event_name == 'repository_dispatch' ||
          github.event_name == 'release' ||
          steps: filter.outputs.base == 'true' ||
          steps: filter.outputs.aider == 'true'
        uses: docker/build-push-action@v6
        with:
          context: flavors/aider
          file: flavors/aider/Containerfile
          platforms: linux/amd64,linux/arm64
          push: true
          build-contexts: |
            ai-agent-sandbox:base=docker-image://ghcr.io/migoller/ai-agent-sandbox-base:latest
          tags: |
            ghcr.io/migoller/ai-agent-sandbox-aider:latest
            ghcr.io/migoller/ai-agent-sandbox-aider:${{ github.sha }}

      - name: Run Trivy scanner on Aider image
        if: |
          github.event_name == 'workflow_dispatch' ||
          github.event_name == 'repository_dispatch' ||
          github.event_name == 'release' ||
          steps: filter.outputs.base == 'true' ||
          steps: filter.outputs.aider == 'true'
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: 'image'
          image-ref: '${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ env.AIDER_IMAGE_NAME }}:latest'
          format: 'sarif'
          output: 'trivy-aider-results.sarif'
          exit-code: '0'
          ignore-unfixed: true
          severity: 'CRITICAL,HIGH'

      - name: Upload Aider scan results to GitHub Security tab
        if: |
          always() && (
            github.event_name == 'workflow_dispatch' ||
            github.event_name == 'repository_dispatch' ||
            github.event_name == 'release' ||
            steps: filter.outputs.base == 'true' ||
            steps: filter.outputs.aider == 'true'
          )
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-aider-results.sarif'
          category: 'image-aider'

      # ==============================================================================
      # STEP 4: CLAUDE-CODE FLAVOR (Runs if claude changed OR base changed OR manual)
      # ==============================================================================
      - name: Build and push Claude-Code flavor
        if: |
          github.event_name == 'workflow_dispatch' ||
          github.event_name == 'repository_dispatch' ||
          github.event_name == 'release' ||
          steps: filter.outputs.base == 'true' ||
          steps: filter.outputs.claude-code == 'true'
        uses: docker/build-push-action@v6
        with:
          context: flavors/claude-code
          file: flavors/claude-code/Containerfile
          platforms: linux/amd64,linux/arm64
          push: true
          build-contexts: |
            ai-agent-sandbox:base=docker-image://ghcr.io/migoller/ai-agent-sandbox-base:latest
          tags: |
            ghcr.io/migoller/ai-agent-sandbox-claude-code:latest
            ghcr.io/migoller/ai-agent-sandbox-claude-code:${{ github.sha }}

      - name: Run Trivy scanner on Claude-Code image
        if: |
          github.event_name == 'workflow_dispatch' ||
          github.event_name == 'repository_dispatch' ||
          github.event_name == 'release' ||
          steps: filter.outputs.base == 'true' ||
          steps: filter.outputs.claude-code == 'true'
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: 'image'
          image-ref: '${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ env.CLAUDE_IMAGE_NAME }}:latest'
          format: 'sarif'
          output: 'trivy-claude-results.sarif'
          exit-code: '0'
          ignore-unfixed: true
          severity: 'CRITICAL,HIGH'

      - name: Upload Claude-Code scan results to GitHub Security tab
        if: |
          always() && (
            github.event_name == 'workflow_dispatch' ||
            github.event_name == 'repository_dispatch' ||
            github.event_name == 'release' ||
            steps: filter.outputs.base == 'true' ||
            steps: filter.outputs.claude-code == 'true'
          )
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-claude-results.sarif'
          category: 'image-claude-code'
  
      # 5. Generate Dynamic Release Summary
      - name: Create release notes summary
        run: |
          {
            echo "## 📦 Container Image Build Summary"
            echo "**Built:** $(date)"
            echo "**Commit:** ${{ github.sha }}"
            echo ""
            echo "### 🚀 Available Packages:"
            echo "- **Base:** \`${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ env.BASE_IMAGE_NAME }}:latest\`"
            echo "- **Hermes:** \`${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ env.HERMES_IMAGE_NAME }}:latest\`"
            echo "- **Aider:** \`${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ env.AIDER_IMAGE_NAME }}:latest\`"
            echo "- **Claude Code:** \`${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ env.CLAUDE_IMAGE_NAME }}:latest\`"
          } >> $GITHUB_STEP_SUMMARY